# =============================================================================
# Leihs Internal Reverse Proxy - Nginx Configuration
# =============================================================================
# Routes incoming requests by URL path to the appropriate leihs service.
# This runs inside the Docker network; NPM handles SSL termination externally.
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 256m;

    # Rate limiting for authentication endpoints
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # Proxy buffer settings to handle large headers/cookies
    proxy_buffer_size 16k;
    proxy_buffers 4 16k;
    proxy_busy_buffers_size 32k;

    # Upstream definitions (ports match leihs defaults)
    upstream legacy   { server leihs-legacy:3210; }
    upstream admin    { server leihs-admin:3220; }
    upstream borrow   { server leihs-borrow:3250; }
    upstream my       { server leihs-my:3240; }
    upstream procure  { server leihs-procure:3230; }

    # Force correct Content-Type for static assets (http-kit does not set it)
    map $uri $forced_content_type {
        "~*\.js$"    "application/javascript";
        "~*\.css$"   "text/css";
        "~*\.svg$"   "image/svg+xml";
        "~*\.woff2$" "font/woff2";
        "~*\.woff$"  "font/woff";
        "~*\.ttf$"   "font/ttf";
        "~*\.png$"   "image/png";
        "~*\.jpe?g$" "image/jpeg";
        "~*\.gif$"   "image/gif";
        "~*\.ico$"   "image/x-icon";
        "~*\.json$"  "application/json";
        "~*\.eot$"   "application/vnd.ms-fontobject";
        default       "";
    }

    server {
        listen 80;
        server_name _;

        # Allow encoded slashes (matches Apache AllowEncodedSlashes NoDecode)
        merge_slashes off;

        # Large request lines (matches Apache LimitRequestLine 32760)
        large_client_header_buffers 4 32k;

        # --- Security headers ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # --- Proxy defaults ---
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        proxy_buffering off;

        # Strip non-leihs cookies to stay under httpkit's 8192-byte header limit.
        # Only forward leihs-user-session and leihs-anti-csrf-token cookies.
        set $filtered_cookie "";
        if ($http_cookie ~* "(leihs-user-session=[^;]+)") {
            set $filtered_cookie $1;
        }
        if ($http_cookie ~* "(leihs-anti-csrf-token=[^;]+)") {
            set $filtered_cookie "$filtered_cookie; $1";
        }
        proxy_set_header Cookie $filtered_cookie;

        # Disable encoding of slashes in proxy pass
        rewrite_log on;

        # --- Static asset Content-Type fix (backend http-kit omits it) ---
        location ~ ^/my/.*\.(js|css|svg|woff2?|ttf|eot|png|jpe?g|gif|ico)$ {
            proxy_pass http://my;
            proxy_set_header Cookie $filtered_cookie;
            proxy_hide_header Content-Type;
            add_header Content-Type $forced_content_type;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        }
        location ~ ^/admin/.*\.(js|css|svg|woff2?|ttf|eot|png|jpe?g|gif|ico)$ {
            proxy_pass http://admin;
            proxy_set_header Cookie $filtered_cookie;
            proxy_hide_header Content-Type;
            add_header Content-Type $forced_content_type;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        }
        location ~ ^/borrow/.*\.(js|css|svg|woff2?|ttf|eot|png|jpe?g|gif|ico)$ {
            proxy_pass http://borrow;
            proxy_set_header Cookie $filtered_cookie;
            proxy_hide_header Content-Type;
            add_header Content-Type $forced_content_type;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        }
        location ~ ^/procure/.*\.(js|css|svg|woff2?|ttf|eot|png|jpe?g|gif|ico)$ {
            proxy_pass http://procure;
            proxy_set_header Cookie $filtered_cookie;
            proxy_hide_header Content-Type;
            add_header Content-Type $forced_content_type;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        }

        # --- Redirects (matching Apache RewriteRules) ---
        rewrite ^/admin/users$ /admin/users/ permanent;
        rewrite ^/admin/top$ /admin/ permanent;
        rewrite ^/app/borrow(.*)$ /borrow$1 permanent;
        rewrite ^/borrow$ /borrow/ permanent;

        # --- My service (also handles root, sign-in, sign-out, etc.) ---
        location = / {
            proxy_pass http://my;
        }
        location /my {
            proxy_pass http://my;
        }
        location /user {
            proxy_pass http://my;
        }
        location /sign-in {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://my;
        }
        location /sign-out {
            proxy_pass http://my;
        }
        location /forgot-password {
            proxy_pass http://my;
        }
        location /reset-password {
            proxy_pass http://my;
        }
        location /translations {
            proxy_pass http://my;
        }

        # --- Legacy admin routes (specific paths go to legacy, not admin) ---
        location /admin/audits {
            proxy_pass http://legacy;
        }
        location /admin/inventory/csv {
            proxy_pass http://legacy;
        }
        location /admin/inventory/excel {
            proxy_pass http://legacy;
        }
        location /admin/inventory/quick_csv {
            proxy_pass http://legacy;
        }
        location /admin/inventory/quick_excel {
            proxy_pass http://legacy;
        }
        location ~ ^/admin/users\.json {
            proxy_pass http://legacy;
        }

        # --- Admin service (Clojure) ---
        location /admin {
            proxy_pass http://admin;
            proxy_read_timeout 180s;
        }

        # --- Borrow service ---
        location /borrow {
            proxy_pass http://borrow;
        }

        # --- Inventory service is not included in this build ---

        # --- Procure service ---
        location /procure {
            proxy_pass http://procure;
        }

        # --- Legacy routes ---
        location /status {
            proxy_pass http://legacy;
        }
        location /categories {
            proxy_pass http://legacy;
        }
        location /category_links {
            proxy_pass http://legacy;
        }
        location /styleguide {
            proxy_pass http://legacy;
        }
        location /models {
            proxy_pass http://legacy;
        }
        location /properties {
            proxy_pass http://legacy;
        }
        location /images {
            proxy_pass http://legacy;
        }
        location /attachments {
            proxy_pass http://legacy;
        }
        location /manage {
            proxy_pass http://legacy;
        }
        location /assets {
            proxy_pass http://legacy;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # --- Health check ---
        location /nginx-health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        # --- Legacy (Rails) - catch-all for everything else ---
        location / {
            proxy_pass http://legacy;
        }
    }
}
